/* ===== Zoom links (lưu localStorage, 1 link/lớp) ===== */
const ZOOM_KEY = "dz_zoom";
const loadZoom = () => { try { return JSON.parse(localStorage.getItem(ZOOM_KEY)) || {}; } catch (e) { return {}; } };
function useZoom() {
  const [zoom, setZoom] = useState(loadZoom);
  useEffect(() => {
    const h = () => setZoom(loadZoom());
    window.addEventListener("dz-zoom", h);
    return () => window.removeEventListener("dz-zoom", h);
  }, []);
  const setLink = (classId, url) => {
    const next = { ...loadZoom() };
    if (url && url.trim()) next[classId] = url.trim(); else delete next[classId];
    try { localStorage.setItem(ZOOM_KEY, JSON.stringify(next)); } catch (e) {}
    window.dispatchEvent(new Event("dz-zoom"));
  };
  return [zoom, setLink];
}

/* Nút Zoom + ô nhập link cho 1 lớp */
function ZoomRow({ classId }) {
  const [zoom, setLink] = useZoom();
  const url = zoom[classId];
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(url || "");

  if (editing) {
    return (
      <div className="flex items-center gap-1.5 w-full">
        <input autoFocus value={val} onChange={e=>setVal(e.target.value)} onClick={e=>e.stopPropagation()}
          placeholder="Dán link Zoom…"
          className="flex-1 min-w-0 px-2.5 py-1.5 rounded-lg border border-stone-200 dark:border-stone-700 bg-white dark:bg-stone-800 text-xs focus:outline-none focus:ring-2 focus:ring-accent-400/40"/>
        <button onClick={(e)=>{e.stopPropagation(); setLink(classId, val); setEditing(false);}} className="px-2.5 py-1.5 rounded-lg bg-accent-600 text-white text-xs font-medium hover:bg-accent-700 transition">Lưu</button>
        <button onClick={(e)=>{e.stopPropagation(); setVal(url||""); setEditing(false);}} className="px-2 py-1.5 rounded-lg text-stone-400 hover:text-stone-600 text-xs">Huỷ</button>
      </div>
    );
  }
  if (url) {
    return (
      <div className="flex items-center gap-1.5">
        <a href={url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
          className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-[#2D8CFF] text-white text-xs font-semibold hover:bg-[#2476d6] transition">
          <I.video/> Vào Zoom
        </a>
        <button onClick={(e)=>{e.stopPropagation(); setVal(url); setEditing(true);}} title="Sửa link" className="w-7 h-7 rounded-full text-stone-400 hover:bg-stone-100 dark:hover:bg-stone-800 hover:text-stone-600 flex items-center justify-center transition"><I.edit/></button>
      </div>
    );
  }
  return (
    <button onClick={(e)=>{e.stopPropagation(); setEditing(true);}} className="inline-flex items-center gap-1.5 text-xs font-medium text-stone-400 hover:text-accent-600 dark:hover:text-accent-400 transition">
      <I.plus/> Thêm link Zoom
    </button>
  );
}

  const c = teacherColor(teacher);
  return (
    <div onClick={onOpen} className="group cursor-pointer rounded-2xl border border-stone-200/80 dark:border-stone-800 bg-white dark:bg-stone-900 p-5 card-shadow hover-lift relative overflow-hidden">
      <div className="absolute -top-8 -right-8 w-28 h-28 rounded-full opacity-50 blur-2xl" style={{ background: c.bg }}></div>
      <div className="relative flex items-center gap-3.5 mb-4">
        <Avatar teacher={teacher} size="lg"/>
        <div className="min-w-0">
          <h3 className="font-display text-lg font-semibold tracking-tight text-stone-900 dark:text-white truncate">{teacher.name}</h3>
          <div className="text-xs text-stone-400 dark:text-stone-500">Lehrerin</div>
        </div>
      </div>

      <div className="relative flex items-center gap-2 mb-4 text-xs">
        <span className="px-2.5 py-1 rounded-full bg-stone-100 dark:bg-stone-800 text-stone-600 dark:text-stone-300 font-medium">{teacher.totalClasses} lớp</span>
        <span className="px-2.5 py-1 rounded-full bg-stone-100 dark:bg-stone-800 text-stone-600 dark:text-stone-300 font-medium">{teacher.totalSessions} buổi</span>
      </div>

      <div className="relative mb-4">
        <div className="flex items-center justify-between text-[11px] text-stone-400 dark:text-stone-500 mb-1.5">
          <span className="uppercase tracking-wider font-medium">Khối lượng</span>
          <span className="tabular-nums">{Math.round(teacher.totalSessions/maxLoad*100)}%</span>
        </div>
        <div className="h-1.5 rounded-full bg-stone-100 dark:bg-stone-800 overflow-hidden">
          <div className="h-full rounded-full" style={{ width: `${teacher.totalSessions/maxLoad*100}%`, background: c.dot }}></div>
        </div>
      </div>

      <div className="relative flex flex-wrap gap-1.5 mb-4">
        {teacher.classes.map(cid => {
          const cl = classColor(cid);
          return (
            <span key={cid} className="inline-flex items-center gap-1.5 text-[11px] font-medium px-2 py-0.5 rounded-full border border-stone-150 dark:border-stone-800 bg-stone-50 dark:bg-stone-800/50">
              <span className="w-1.5 h-1.5 rounded-full" style={{ background: cl.dot }}></span>
              <span className="text-stone-600 dark:text-stone-300">{cid}</span>
            </span>
          );
        })}
      </div>

      <div className="relative flex items-center gap-1.5 text-sm font-medium text-accent-600 dark:text-accent-400 group-hover:gap-2.5 transition-all">
        <I.cal/> Xem lịch dạy <I.arrow/>
      </div>
    </div>
  );
}

/* ============ CALENDAR ============ */
/* Pool tất cả buổi học toàn trung tâm (mỗi buổi: ngày, lớp, giờ, các cô dạy) */
const ALL_SESSIONS = (() => {
  const map = {};
  TEACHERS.forEach(t => t.schedule.forEach(ss => {
    const k = ss.date + "|" + ss.classId;
    if (!map[k]) map[k] = { date: ss.date, classId: ss.classId, time: ss.time, teachers: [] };
    if (!map[k].teachers.includes(t.name)) map[k].teachers.push(t.name);
  }));
  return Object.values(map).sort((a,b) => a.date.localeCompare(b.date) || a.classId.localeCompare(b.classId));
})();

/* Modal chọn buổi dự thính */
function AuditPicker({ teacher, audit, setAudit, onClose }) {
  const [q, setQ] = useState("");
  const today = new Date(); today.setHours(0,0,0,0);
  const ownKeys = new Set(teacher.schedule.map(s => s.date + "|" + s.classId));
  const auditSet = new Set(audit);

  const pool = ALL_SESSIONS.filter(s => {
    if (new Date(s.date) < today) return false;
    if (ownKeys.has(s.date + "|" + s.classId)) return false;
    if (!q.trim()) return true;
    const n = q.toLowerCase();
    return s.classId.toLowerCase().includes(n) || s.teachers.some(t => t.toLowerCase().includes(n));
  });
  // group by date
  const groups = {};
  pool.forEach(s => { (groups[s.date] = groups[s.date] || []).push(s); });

  const toggle = (k) => setAudit(a => a.includes(k) ? a.filter(x => x !== k) : [...a, k]);
  const DAY_VN = ["CN","T2","T3","T4","T5","T6","T7"];

  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-stone-900/50 dark:bg-black/80 backdrop-blur-sm fade-in" onClick={onClose}>
      <div className="bg-white dark:bg-stone-900 rounded-3xl w-full max-w-lg max-h-[85vh] overflow-hidden shadow-2xl border border-stone-200 dark:border-stone-800 flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="px-5 py-4 border-b border-stone-100 dark:border-stone-800">
          <div className="flex items-center justify-between gap-2">
            <div>
              <div className="font-display text-lg font-semibold text-stone-900 dark:text-white">Chọn buổi dự thính</div>
              <div className="text-xs text-stone-400 dark:text-stone-500 mt-0.5">{teacher.name} · đã chọn {audit.length} buổi</div>
            </div>
            <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 flex items-center justify-center text-stone-500"><I.x/></button>
          </div>
          <div className="mt-3"><SearchInput value={q} onChange={setQ} placeholder="Tìm lớp hoặc cô giáo…"/></div>
        </div>
        <div className="overflow-auto scrollbar-thin p-3 flex-1">
          {Object.keys(groups).length === 0 && <div className="text-center py-12 text-sm text-stone-400">Không có buổi nào.</div>}
          {Object.entries(groups).map(([date, list]) => {
            const dt = new Date(date);
            return (
              <div key={date} className="mb-3">
                <div className="px-1 py-1 text-[11px] font-semibold text-stone-400 dark:text-stone-500 uppercase tracking-wider sticky top-0 bg-white/90 dark:bg-stone-900/90 backdrop-blur">
                  {DAY_VN[dt.getDay()]} · {formatDate(date)}
                </div>
                <div className="space-y-1">
                  {list.map(s => {
                    const k = s.date + "|" + s.classId;
                    const on = auditSet.has(k);
                    const cl = classColor(s.classId);
                    const others = s.teachers.filter(t => t !== teacher.name);
                    return (
                      <button key={k} onClick={()=>toggle(k)}
                        className={`w-full flex items-center gap-3 px-3 py-2 rounded-xl border text-left transition ${
                          on ? "border-accent-400 bg-accent-50 dark:bg-accent-700/20 dark:border-accent-600" : "border-stone-150 dark:border-stone-800 hover:border-stone-300 dark:hover:border-stone-700"
                        }`}>
                        <span className={`w-5 h-5 rounded-md border-2 flex items-center justify-center flex-shrink-0 ${on ? "bg-accent-600 border-accent-600 text-white" : "border-stone-300 dark:border-stone-600"}`}>
                          {on && <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>}
                        </span>
                        <span className="w-1 self-stretch rounded-full" style={{ background: cl.dot }}></span>
                        <span className="flex-1 min-w-0">
                          <span className="block text-sm font-semibold text-stone-800 dark:text-stone-100 truncate">{s.classId}</span>
                          <span className="block text-xs text-stone-400 dark:text-stone-500 truncate">{s.time} · {others.join(", ") || "—"}</span>
                        </span>
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
        <div className="px-5 py-3 border-t border-stone-100 dark:border-stone-800 flex items-center justify-between">
          <button onClick={()=>setAudit([])} className="text-xs font-medium text-stone-400 hover:text-rose-600 transition">Xoá hết</button>
          <button onClick={onClose} className="px-4 py-2 rounded-full bg-accent-600 text-white text-sm font-medium hover:bg-accent-700 transition">Xong</button>
        </div>
      </div>
    </div>
  );
}

function CalendarModal({ teacher, onClose }) {
  const c = teacherColor(teacher);
  const [zoom] = useZoom();
  const [idx, setIdx] = useState(0);
  const [pickerOpen, setPickerOpen] = useState(false);

  // Dự thính — lưu localStorage theo tên cô
  const STORAGE_KEY = "dz_audit_" + teacher.name;
  const [audit, setAudit] = useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch (e) { return []; }
  });
  useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(audit)); } catch (e) {} }, [audit]);

  // các buổi dự thính (đã chọn) -> object đầy đủ
  const auditSessions = ALL_SESSIONS.filter(s => audit.includes(s.date + "|" + s.classId));

  // phạm vi tháng = gộp buổi dạy + buổi dự thính
  const allDates = [...teacher.schedule.map(s => new Date(s.date)), ...auditSessions.map(s => new Date(s.date))].sort((a,b) => a-b);
  const minD = allDates[0]; const maxD = allDates[allDates.length-1];
  const months = [];
  let cur = new Date(minD.getFullYear(), minD.getMonth(), 1);
  while (cur <= maxD) { months.push(new Date(cur)); cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1); }
  const safeIdx = Math.min(idx, months.length-1);
  const month = months[safeIdx];
  const monthLabel = month.toLocaleDateString("vi-VN", { month: "long", year: "numeric" });

  const inMonth = (iso) => { const d = new Date(iso); return d.getFullYear()===month.getFullYear() && d.getMonth()===month.getMonth(); };
  const monthSessions = teacher.schedule.filter(s => inMonth(s.date));
  const monthAudit = auditSessions.filter(s => inMonth(s.date));

  const sessionByDay = {}; monthSessions.forEach(ss => { const d=new Date(ss.date).getDate(); (sessionByDay[d]=sessionByDay[d]||[]).push(ss); });
  const auditByDay = {};   monthAudit.forEach(ss => { const d=new Date(ss.date).getDate(); (auditByDay[d]=auditByDay[d]||[]).push(ss); });

  const firstWeekday = (new Date(month.getFullYear(), month.getMonth(), 1).getDay() + 6) % 7;
  const daysInMonth = new Date(month.getFullYear(), month.getMonth()+1, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const today = new Date();
  const isToday = (d) => today.getFullYear() === month.getFullYear() && today.getMonth() === month.getMonth() && today.getDate() === d;

  useEffect(()=> {
    const h = (e) => { if (e.key === "Escape") { if (pickerOpen) setPickerOpen(false); else onClose(); } };
    window.addEventListener("keydown", h);
    return ()=> window.removeEventListener("keydown", h);
  }, [pickerOpen]);

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-stone-900/40 dark:bg-black/70 backdrop-blur-sm fade-in" onClick={onClose}>
      <div className="bg-white dark:bg-stone-900 rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-hidden shadow-2xl border border-stone-200 dark:border-stone-800 flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="px-6 py-4 border-b border-stone-100 dark:border-stone-800 flex items-center gap-3.5">
          <Avatar teacher={teacher} size="lg"/>
          <div className="flex-1 min-w-0">
            <div className="font-display text-lg font-semibold tracking-tight text-stone-900 dark:text-white">{teacher.name}</div>
            <div className="text-xs text-stone-400 dark:text-stone-500">Kalender · {teacher.totalSessions} buổi · {teacher.totalClasses} lớp{audit.length>0 && <span> · <span className="text-accent-600 dark:text-accent-400 font-medium">{audit.length} dự thính</span></span>}</div>
          </div>
          <button onClick={()=>setPickerOpen(true)} className="px-3 py-2 rounded-full bg-accent-50 dark:bg-accent-700/20 text-accent-700 dark:text-accent-300 text-xs font-semibold hover:bg-accent-100 dark:hover:bg-accent-700/30 transition flex items-center gap-1.5 border border-accent-200 dark:border-accent-700/40">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            Dự thính
          </button>
          <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 flex items-center justify-center text-stone-500"><I.x/></button>
        </div>

        <div className="px-6 py-3 flex items-center justify-between border-b border-stone-100 dark:border-stone-800">
          <button disabled={safeIdx===0} onClick={()=>setIdx(i=>Math.max(0,i-1))} className="w-8 h-8 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center text-stone-500"><I.chevL/></button>
          <div className="font-display font-medium text-base capitalize text-stone-900 dark:text-white">{monthLabel}</div>
          <button disabled={safeIdx===months.length-1} onClick={()=>setIdx(i=>Math.min(months.length-1,i+1))} className="w-8 h-8 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center text-stone-500"><I.chevR/></button>
        </div>

        <div className="grid lg:grid-cols-[1fr_290px] overflow-hidden flex-1 min-h-0">
          <div className="p-6 overflow-auto scrollbar-thin">
            <div className="grid grid-cols-7 gap-1.5 text-center text-[11px] font-semibold text-stone-400 dark:text-stone-500 uppercase tracking-wider mb-2">
              {["T2","T3","T4","T5","T6","T7","CN"].map(d => <div key={d}>{d}</div>)}
            </div>
            <div className="grid grid-cols-7 gap-1.5">
              {cells.map((d, i) => {
                if (!d) return <div key={i} className="aspect-square"></div>;
                const own = sessionByDay[d] || [];
                const aud = auditByDay[d] || [];
                const hasOwn = own.length > 0;
                const hasAud = aud.length > 0;
                const cl = hasOwn ? classColor(own[0].classId) : null;
                const style = hasOwn ? { ['--bg-l']:cl.bg, ['--bg-d']:cl.bgDark, ['--text-l']:cl.text, ['--text-d']:cl.textDark } : {};
                return (
                  <div key={i} style={style}
                    className={`aspect-square rounded-xl p-1.5 flex flex-col gap-0.5 text-left transition relative ${
                      hasOwn ? "cal-cell hover:scale-[1.04]"
                             : hasAud ? "border-2 border-dashed border-accent-400 text-accent-700 dark:text-accent-300 dark:border-accent-500"
                             : "text-stone-300 dark:text-stone-700 hover:bg-stone-50 dark:hover:bg-stone-800/40"
                    } ${isToday(d) ? "ring-2 ring-stone-900 dark:ring-white ring-offset-2 ring-offset-white dark:ring-offset-stone-900" : ""}`}>
                    <div className="text-xs font-semibold">{d}</div>
                    {hasOwn && <div className="text-[9px] leading-tight truncate font-medium opacity-90">{own[0].classId.replace("DZ-","").replace("Ôn-tập-","Ôn ")}{own.length>1 && ` +${own.length-1}`}</div>}
                    {!hasOwn && hasAud && <div className="text-[9px] leading-tight truncate font-medium">{aud[0].classId.replace("DZ-","").replace("Ôn-tập-","Ôn ")}</div>}
                    {hasAud && <span className="absolute top-0.5 right-1 text-[8px] font-bold text-accent-600 dark:text-accent-300">DT</span>}
                  </div>
                );
              })}
            </div>
            <div className="mt-5 pt-4 border-t border-stone-100 dark:border-stone-800">
              <div className="text-[11px] font-semibold text-stone-400 dark:text-stone-500 uppercase tracking-wider mb-2">Chú thích</div>
              <div className="flex flex-wrap gap-x-4 gap-y-2 text-xs">
                {teacher.classes.map(cid => {
                  const cl = classColor(cid);
                  return <div key={cid} className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-md" style={{ background: cl.dot }}></span><span className="text-stone-600 dark:text-stone-300 font-medium">{cid}</span></div>;
                })}
                {audit.length>0 && <div className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-md border-2 border-dashed border-accent-500"></span><span className="text-accent-600 dark:text-accent-300 font-medium">Dự thính</span></div>}
              </div>
            </div>
          </div>

          <div className="border-t lg:border-t-0 lg:border-l border-stone-100 dark:border-stone-800 overflow-auto scrollbar-thin bg-stone-50/50 dark:bg-stone-950/30">
            <div className="px-4 py-3 sticky top-0 bg-white/90 dark:bg-stone-900/90 backdrop-blur border-b border-stone-100 dark:border-stone-800">
              <div className="text-[11px] font-semibold text-stone-400 dark:text-stone-500 uppercase tracking-wider">Tháng {month.getMonth()+1}</div>
              <div className="text-sm font-display font-semibold text-stone-900 dark:text-white mt-0.5">{monthSessions.length} buổi dạy{monthAudit.length>0 && ` · ${monthAudit.length} dự thính`}</div>
            </div>
            <div className="p-3 space-y-1.5">
              {monthSessions.length === 0 && monthAudit.length === 0 && <div className="text-sm text-stone-400 text-center py-10">Không có buổi nào.</div>}
              {monthSessions.map((sess, i) => {
                const cls = CLASSES.find(c => c.id === sess.classId);
                const cl = classColor(sess.classId);
                return (
                  <div key={"o"+i} className="flex gap-2.5 px-2.5 py-2 rounded-xl bg-white dark:bg-stone-900 border border-stone-100 dark:border-stone-800 hover:border-stone-200 dark:hover:border-stone-700 transition">
                    <span className="w-1 rounded-full self-stretch flex-shrink-0" style={{ background: cl.dot }}></span>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-start justify-between gap-2 mb-0.5">
                        <div className="text-sm font-semibold text-stone-800 dark:text-stone-100 truncate">{sess.classId}</div>
                        {cls && <LevelChip level={cls.level}/>}
                      </div>
                      <div className="text-xs text-stone-400 dark:text-stone-500 tabular-nums">{formatDate(sess.date)} · {sess.time}</div>
                    </div>
                    {zoom[sess.classId] && (
                      <a href={zoom[sess.classId]} target="_blank" rel="noopener noreferrer" title="Vào Zoom" className="self-center flex-shrink-0 w-7 h-7 rounded-full bg-[#2D8CFF]/10 text-[#2D8CFF] hover:bg-[#2D8CFF] hover:text-white flex items-center justify-center transition"><I.video/></a>
                    )}
                  </div>
                );
              })}
              {monthAudit.length > 0 && (
                <div className="pt-2">
                  <div className="px-1 pb-1 text-[11px] font-semibold text-accent-600 dark:text-accent-400 uppercase tracking-wider">Dự thính</div>
                  {monthAudit.map((sess, i) => {
                    const cls = CLASSES.find(c => c.id === sess.classId);
                    const others = sess.teachers.filter(t => t !== teacher.name);
                    return (
                      <div key={"a"+i} className="flex gap-2.5 px-2.5 py-2 rounded-xl border-2 border-dashed border-accent-300 dark:border-accent-700/60 bg-accent-50/40 dark:bg-accent-700/10 mb-1.5">
                        <div className="flex-1 min-w-0">
                          <div className="flex items-start justify-between gap-2 mb-0.5">
                            <div className="text-sm font-semibold text-stone-800 dark:text-stone-100 truncate">{sess.classId}</div>
                            {cls && <LevelChip level={cls.level}/>}
                          </div>
                          <div className="text-xs text-stone-400 dark:text-stone-500 tabular-nums">{formatDate(sess.date)} · {sess.time}{others.length>0 && ` · ${others.join(", ")}`}</div>
                        </div>
                        {zoom[sess.classId] && (
                          <a href={zoom[sess.classId]} target="_blank" rel="noopener noreferrer" title="Vào Zoom" className="self-center flex-shrink-0 w-7 h-7 rounded-full bg-[#2D8CFF]/10 text-[#2D8CFF] hover:bg-[#2D8CFF] hover:text-white flex items-center justify-center transition"><I.video/></a>
                        )}
                        <button onClick={()=>setAudit(a=>a.filter(x=>x!==sess.date+"|"+sess.classId))} className="self-center text-stone-300 hover:text-rose-500 transition flex-shrink-0"><I.x/></button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
      {pickerOpen && <AuditPicker teacher={teacher} audit={audit} setAudit={setAudit} onClose={()=>setPickerOpen(false)}/>}
    </div>
  );
}

/* ============ APP ============ */
function App() {
  const [tab, setTab] = useState("classes");
  const [dark, setDark] = useState(() => {
    if (typeof window !== "undefined") {
      if (window.__dz_dark !== undefined) return window.__dz_dark;
      return window.matchMedia("(prefers-color-scheme: dark)").matches;
    }
    return false;
  });

  useEffect(() => {
    document.documentElement.classList.toggle("dark", dark);
    window.__dz_dark = dark;
  }, [dark]);

  return (
    <div className="min-h-screen">
      <Header tab={tab} setTab={setTab} dark={dark} setDark={setDark}/>
      {tab === "classes" && <ClassesPage/>}
      {tab === "teachers" && <TeachersPage/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
