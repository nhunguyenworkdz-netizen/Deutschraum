(function(){

    apiKey: "AIzaSyDh8zUnX5fSmHghECwX1tbTKAZ1hnF4uDw",
    authDomain: "deutschraum-521e8.firebaseapp.com",
    databaseURL: "https://deutschraum-521e8-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "deutschraum-521e8",
    storageBucket: "deutschraum-521e8.firebasestorage.app",
    messagingSenderId: "159229043222",
    appId: "1:159229043222:web:b0173c95139d3786600b37"
  };
  window.__dz_cloud_status = "loading";
  try {
    if (typeof firebase === "undefined") throw new Error("Firebase SDK chưa tải được (có thể bị chặn).");
    firebase.initializeApp(cfg);
    const db = firebase.database();
    const root = db.ref("appdata");
    const SKIP = new Set(["dz_user", "dz_dark"]);
    const orig = localStorage.setItem.bind(localStorage);
    let _silent = false;
    localStorage.setItem = function(k, v) {
      orig(k, v);
      if (_silent) return;
      if (!k || !k.startsWith("dz_") || SKIP.has(k)) return;
      try { db.ref("appdata/" + k).set(JSON.parse(v)); } catch (e) {}
    };
    root.once("value").then(function(snap) {
      const cloud = snap.val() || {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k || !k.startsWith("dz_") || SKIP.has(k)) continue;
        if (!(k in cloud)) {
          try { db.ref("appdata/" + k).set(JSON.parse(localStorage.getItem(k))); } catch (e) {}
        }
      }
    });
    root.on("value", function(snap) {
      const data = snap.val() || {};
      let dirty = false;
      for (const k in data) {
        const valStr = JSON.stringify(data[k]);
        if (localStorage.getItem(k) !== valStr) {
          _silent = true; orig(k, valStr); _silent = false;
          dirty = true;
        }
      }
      if (dirty) { window.dispatchEvent(new Event("dz-zoom")); window.dispatchEvent(new Event("dz-sync")); }
    });
    window.__dz_cloud_status = "ok";
    console.log("✓ Firebase đã kết nối");
  } catch (e) {
    window.__dz_cloud_status = "blocked";
    console.warn("Firebase không kết nối được — dùng Xuất/Nhập file thay thế:", e.message);
  }
  window.dispatchEvent(new Event("dz-cloud-status"));
})();
</script>

/* ===== Zoom links (lưu localStorage, 1 link/lớp) ===== */
const ZOOM_KEY = "dz_zoom";
const loadZoom = () => { try { return JSON.parse(localStorage.getItem(ZOOM_KEY)) || {}; } catch (e) { return {}; } };
function useZoom() {
  const [zoom, setZoom] = useState(loadZoom);
  useEffect(() => {
    const h = () => setZoom(loadZoom());
    window.addEventListener("dz-zoom", h);
    return () => window.removeEventListener("dz-zoom", h);
  }, []);
  const setLink = (classId, url) => {
    const next = { ...loadZoom() };
    if (url && url.trim()) next[classId] = url.trim(); else delete next[classId];
    try { localStorage.setItem(ZOOM_KEY, JSON.stringify(next)); } catch (e) {}
    window.dispatchEvent(new Event("dz-zoom"));
  };
  return [zoom, setLink];
}

/* Nút Zoom + ô nhập link cho 1 lớp */
function ZoomRow({ classId }) {
  const [zoom, setLink] = useZoom();
  const url = zoom[classId];
  const [editing, setEditing] = useState(false);

  if (editing) {
    return (
      <div className="flex items-center gap-1.5 w-full">

        <button onClick={(e)=>{e.stopPropagation(); setLink(classId, val); setEditing(false);}} className="px-2.5 py-1.5 rounded-lg bg-accent-600 text-white text-xs font-medium hover:bg-accent-700 transition">Lưu</button>
        <button onClick={(e)=>{e.stopPropagation(); setVal(url||""); setEditing(false);}} className="px-2 py-1.5 rounded-lg text-stone-400 hover:text-stone-600 text-xs">Huỷ</button>
      </div>
    );
  }
  if (url) {
    return (
      <div className="flex items-center gap-1.5">
        <a href={url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}
          className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-[#2D8CFF] text-white text-xs font-semibold hover:bg-[#2476d6] transition">
          <I.video/> Vào Zoom

function SearchInput({ value, onChange, placeholder }) {

      />

function StatusBadge({ status }) {
  const map = {
    active:   { c:"text-emerald-700 dark:text-emerald-300", d:"bg-emerald-500", t:"Đang học" },
    upcoming: { c:"text-accent-700 dark:text-accent-300",   d:"bg-accent-500",  t:"Sắp khai giảng" },
    finished: { c:"text-stone-400 dark:text-stone-500",     d:"bg-stone-400",   t:"Đã kết thúc" },
  };
  const m = map[status] || map.upcoming;
  return <span className={`inline-flex items-center gap-1.5 text-xs font-medium ${m.c}`}><span className={`w-1.5 h-1.5 rounded-full ${m.d} ${status==="active"?"ring-2 ring-emerald-500/20":""}`}></span>{m.t}</span>;
}

function LevelChip({ level }) {
  return <span className={`text-[11px] font-semibold px-2 py-0.5 rounded-full ${levelTint(level)}`}>{level}</span>;
}

function Avatar({ teacher, size="md" }) {
  const c = teacherColor(teacher);
  const sz = size==="lg" ? "w-12 h-12 text-sm" : size==="sm" ? "w-8 h-8 text-[11px]" : "w-10 h-10 text-xs";
  return (
    <div className={`${sz} rounded-full flex items-center justify-center font-semibold flex-shrink-0 ring-2 ring-white dark:ring-stone-800 shadow-sm`}
      style={{ background: `linear-gradient(135deg, ${c.bg}, ${c.dot}33)`, color: c.text }}>
      {initials(teacher.name)}

function PageHeader({ kicker, title, subtitle, stats }) {
  return (
    <div className="mb-8 pb-6 border-b border-stone-100 dark:border-stone-800">

      {stats && (
        <div className="flex flex-wrap items-baseline gap-x-6 gap-y-1.5 mt-4 text-sm">
          {stats.map(s => (
            <span key={s.label} className="inline-flex items-baseline gap-1.5">
              <span className="text-stone-400 dark:text-stone-500">{s.label}</span>
              <span className="font-semibold text-stone-800 dark:text-stone-100 tabular-nums">{s.value}</span>
            </span>
          ))}

/* ============ CLASSES ============ */
function ClassesPage() {
  const [q, setQ] = useState("");
  const [filter, setFilter] = useState("all");

  const LEVEL_ORDER = ["A1", "Ôn tập A1", "A2", "Ôn tập A2", "B1", "Ôn tập B1"];

  const filtered = useMemo(() => {
    return CLASSES.filter(c => {
      if (filter !== "all" && c.status !== filter) return false;
      if (!q.trim()) return true;
      const n = q.toLowerCase();
      return c.id.toLowerCase().includes(n) || c.level.toLowerCase().includes(n) || c.teachers.some(t => t.name.toLowerCase().includes(n));
    });
  }, [q, filter]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(c => { (g[c.level] = g[c.level] || []).push(c); });
    const order = [...LEVEL_ORDER];
    Object.keys(g).forEach(lv => { if (!order.includes(lv)) order.push(lv); });
    return order.filter(lv => g[lv] && g[lv].length).map(lv => ({ level: lv, items: g[lv] }));
  }, [filtered]);

  return (
    <div className="max-w-6xl mx-auto px-6 py-10 fade-in">
      <PageHeader
        kicker="Quản lý"
        title="Lớp học"
        subtitle={`${CLASSES.length} lớp tại trung tâm`}
        stats={[
          { label:"Tổng số lớp", value: CLASSES.length },
          { label:"Đang học", value: CLASSES.filter(c=>c.status==="active").length },
          { label:"Sắp khai giảng", value: CLASSES.filter(c=>c.status==="upcoming").length },
          { label:"Đã kết thúc", value: CLASSES.filter(c=>c.status==="finished").length },
        ]}
      />

      <div className="flex flex-wrap items-center gap-2 mb-5">
        <div className="flex gap-0.5 bg-stone-100 dark:bg-stone-900 p-1 rounded-full border border-stone-200/60 dark:border-stone-800/60">
          {[{v:"all",l:"Tất cả"},{v:"active",l:"Đang học"},{v:"upcoming",l:"Sắp KG"},{v:"finished",l:"Đã kết thúc"}].map(o => (
            <button key={o.v} onClick={()=>setFilter(o.v)} className={`px-3.5 py-1.5 rounded-full text-xs font-medium transition ${
              filter===o.v ? "bg-white dark:bg-stone-800 text-stone-900 dark:text-white shadow-sm" : "text-stone-500 dark:text-stone-400 hover:text-stone-800 dark:hover:text-stone-200"
            }`}>{o.l}</button>
          ))}
        </div>
        <div className="flex-1 max-w-xs ml-auto"><SearchInput value={q} onChange={setQ} placeholder="Tìm lớp, giáo viên…"/></div>
      </div>

      {grouped.length === 0 ? (
        <div className="text-center py-16 text-sm text-stone-400 dark:text-stone-500">Không có lớp nào khớp.</div>
      ) : grouped.map(group => <CourseTable key={group.level} group={group}/>)}
    </div>
  );
}

function CourseTable({ group }) {
  const levelInitial = group.level.includes("Ôn") ? "Ô" + group.level.replace(/[^0-9]/g,"") : group.level;
  const subtitle = group.level === "A1" ? "Nhập môn tiếng Đức" : group.level === "Ôn tập A1" ? "Ôn luyện trước thi A1" : group.level === "A2" ? "Giao tiếp cơ bản" : group.level === "Ôn tập A2" ? "Ôn luyện trước thi A2" : group.level === "B1" ? "Trung cấp tiếng Đức" : "Ôn luyện trước thi B1";
  return (
    <div className="mb-6 rounded-2xl border border-stone-200 dark:border-stone-800 bg-white dark:bg-stone-900 p-5 sm:p-6">
      <div className="flex items-start gap-4 mb-5">
        <div className={`w-12 h-12 rounded-xl flex items-center justify-center font-bold text-sm flex-shrink-0 ${levelTint(group.level)}`}>{levelInitial}</div>
        <div className="flex-1 min-w-0">
          <h2 className="font-display text-xl font-bold text-stone-900 dark:text-white">Khóa Tiếng Đức {group.level}</h2>
          <p className="text-xs text-stone-500 dark:text-stone-400 mt-0.5">{subtitle} · {group.items.length} lớp đang mở</p>
        </div>
      </div>
      <div className="overflow-x-auto -mx-5 sm:-mx-6">
        <table className="w-full text-sm min-w-[700px]">
          <thead>
            <tr className="text-[10px] uppercase tracking-wider text-stone-400 dark:text-stone-500">
              <th className="px-5 sm:px-6 py-2 text-left font-semibold">Tên lớp</th>
              <th className="px-3 py-2 text-left font-semibold">Giáo viên</th>
              <th className="px-3 py-2 text-left font-semibold">Lịch học</th>
              <th className="px-3 py-2 text-left font-semibold">Giờ</th>
              <th className="px-3 py-2 text-left font-semibold">Khai giảng</th>
              <th className="px-3 py-2 text-left font-semibold">Trạng thái</th>
              <th className="px-5 sm:px-6 py-2 text-right font-semibold">Zoom</th>
            </tr>
          </thead>
          <tbody>
            {group.items.map(cls => <ClassRow key={cls.id} cls={cls}/>)}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function ClassRow({ cls }) {
  const cc = classColor(cls.id);
  const faded = cls.status === "finished";
  return (
    <tr className={`border-t border-stone-100 dark:border-stone-800 ${faded ? "opacity-60" : ""}`}>
      <td className="px-5 sm:px-6 py-3 font-semibold text-stone-800 dark:text-stone-100 whitespace-nowrap">
        <div className="flex items-center gap-2">
          <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ background: cc.dot }}></span>
          {cls.id}
        </div>
      </td>
      <td className="px-3 py-3">
        <div className="space-y-1.5">
          {cls.teachers.map(t => {
            const teacher = TEACHERS.find(x => x.name === t.name) || { name: t.name, classes:[cls.id] };
            return (
              <div key={t.name} className="flex items-center gap-2">
                <Avatar teacher={teacher} size="sm"/>
                <div className="leading-tight">
                  <div className="text-xs font-semibold text-stone-800 dark:text-stone-100 whitespace-nowrap">{t.name.replace("Cô ","")}</div>
                  <div className="text-[10px] text-stone-400 dark:text-stone-500 whitespace-nowrap">{t.days}</div>
                </div>
              </div>
            );
          })}
        </div>
      </td>
      <td className="px-3 py-3 text-stone-600 dark:text-stone-300 whitespace-nowrap">{cls.days}</td>
      <td className="px-3 py-3 text-stone-600 dark:text-stone-300 whitespace-nowrap tabular-nums">{cls.time}</td>
      <td className="px-3 py-3 text-stone-600 dark:text-stone-300 whitespace-nowrap tabular-nums">{formatDate(cls.start)}</td>
      <td className="px-3 py-3"><StatusBadge status={cls.status}/></td>
      <td className="px-5 sm:px-6 py-3 text-right">
        {cls.status !== "finished" ? <ZoomRow classId={cls.id}/> : <span className="text-xs text-stone-300 dark:text-stone-600">—</span>}
      </td>
    </tr>
  );
}

function ClassCard({ cls }) {
  const cc = classColor(cls.id);
  const faded = cls.status === "finished";
  return (
    <div className={`group rounded-xl border border-stone-150 dark:border-stone-800 bg-white dark:bg-stone-900 p-5 transition hover:border-stone-300 dark:hover:border-stone-700 ${faded?"opacity-70":""}`}>
      <div className="mb-3">
        <div className="flex items-center gap-2 mb-2 flex-wrap">
          <LevelChip level={cls.level}/>
          <StatusBadge status={cls.status}/>
        </div>
        <div className="flex items-center gap-2.5 min-w-0">
          <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ background: cc.dot }}></span>
          <h3 className="text-lg font-semibold tracking-tight text-stone-900 dark:text-white truncate">{cls.id}</h3>
        </div>
      </div>

      <div className="space-y-1 text-sm">
        <div className="flex items-baseline gap-2.5">
          <span className="w-16 text-xs text-stone-400 dark:text-stone-500 flex-shrink-0">Lịch</span>
          <span className="text-stone-700 dark:text-stone-200">{cls.days} · {cls.time}</span>
        </div>
        <div className="flex items-baseline gap-2.5">
          <span className="w-16 text-xs text-stone-400 dark:text-stone-500 flex-shrink-0">Thời gian</span>
          <span className="text-stone-600 dark:text-stone-300 tabular-nums">{formatDate(cls.start)} → {formatDate(cls.end)}</span>
        </div>
      </div>

      {cls.note && (
        <div className="mt-3 text-xs font-medium text-amber-700 dark:text-amber-400 bg-amber-50 dark:bg-amber-500/10 rounded-lg px-3 py-2">⚠ {cls.note}</div>
      )}

      {cls.status === "active" && (() => {
        let total = 0, remaining = 0;
        cls.teachers.forEach(t => {
          const m = (t.sessions || "").match(/(\d+)\s*\/\s*(\d+)/);
          if (m) { remaining += parseInt(m[1]); total += parseInt(m[2]); }
        });
        if (!total) return null;
        const done = total - remaining;
        const pct = Math.round(done / total * 100);
        return (
          <div className="mt-4 pt-4 border-t border-stone-100 dark:border-stone-800">
            <div className="flex items-baseline justify-between mb-1.5">
              <span className="text-xs text-stone-400 dark:text-stone-500">Tiến độ</span>
              <span className="text-xs font-semibold text-stone-700 dark:text-stone-200 tabular-nums">{done}/{total} buổi · {pct}%</span>
            </div>
            <div className="h-2 rounded-full bg-stone-100 dark:bg-stone-800 overflow-hidden">
              <div className="h-full rounded-full transition-all duration-500" style={{ width: pct + "%", background: cc.dot }}></div>
            </div>
          </div>
        );
      })()}

      <div className="mt-4 pt-4 border-t border-stone-100 dark:border-stone-800">
        <div className="text-xs text-stone-400 dark:text-stone-500 mb-2">Giáo viên</div>
        <div className="space-y-2">
          {cls.teachers.map(t => {
            const teacher = TEACHERS.find(x => x.name === t.name) || { name: t.name, classes:[cls.id] };
            return (
              <div key={t.name} className="flex items-center gap-3">
                <Avatar teacher={teacher} size="sm"/>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-semibold text-stone-800 dark:text-stone-100 truncate">{t.name}</div>
                  <div className="text-xs text-stone-500 dark:text-stone-400">{t.days} · {t.sessions} buổi</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {cls.status !== "finished" && (
        <div className="mt-4 pt-4 border-t border-stone-100 dark:border-stone-800 flex items-center justify-between gap-2">
          <ZoomRow classId={cls.id}/>
        </div>
      )}
    </div>
  );
}

/* ============ TEACHERS ============ */
function TeachersPage({ user }) {
  const [q, setQ] = useState("");
  const [openTeacher, setOpenTeacher] = useState(null);
  const maxLoad = Math.max(...TEACHERS.map(t=>t.totalSessions));

  const filtered = useMemo(() => {
    if (!q.trim()) return TEACHERS;
    const n = q.toLowerCase();
    return TEACHERS.filter(t => t.name.toLowerCase().includes(n) || t.classes.some(c => c.toLowerCase().includes(n)));
  }, [q]);

  return (
    <div className="max-w-6xl mx-auto px-6 py-10 fade-in">
      <PageHeader
        kicker="Đội ngũ"
        title="Giáo viên"
        subtitle={`${TEACHERS.length} giáo viên`}
        stats={[
          { label:"Giáo viên", value: TEACHERS.length },
          { label:"Tổng buổi còn lại", value: TEACHERS.reduce((a,t)=>a+t.totalSessions,0) },
          { label:"Lượt phân lớp", value: TEACHERS.reduce((a,t)=>a+t.totalClasses,0) },
          { label:"Cao nhất", value: maxLoad + " buổi" },
        ]}
      />

      <div className="flex items-center justify-end mb-5">
        <div className="w-full sm:w-72"><SearchInput value={q} onChange={setQ} placeholder="Tìm giáo viên…"/></div>
      </div>

      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        {filtered.map(t => <TeacherCard key={t.name} teacher={t} maxLoad={maxLoad} onOpen={()=>setOpenTeacher(t)}/>)}
      </div>
      {filtered.length === 0 && <div className="text-center py-16 text-sm text-stone-400 dark:text-stone-500">Không có giáo viên nào khớp.</div>}

      {openTeacher && <CalendarModal teacher={openTeacher} user={user} onClose={()=>setOpenTeacher(null)}/>}
    </div>
  );
}

function TeacherCard({ teacher, maxLoad, onOpen }) {
  const c = teacherColor(teacher);
  return (
    <div onClick={onOpen} className="group cursor-pointer rounded-lg border border-stone-100 dark:border-stone-800 bg-white dark:bg-stone-900 p-5 card-shadow hover-lift relative overflow-hidden">
      <div className="absolute -top-8 -right-8 w-28 h-28 rounded-full opacity-50 blur-2xl" style={{ background: c.bg }}></div>
      <div className="relative flex items-center gap-3.5 mb-4">
        <Avatar teacher={teacher} size="lg"/>
        <div className="min-w-0">
          <h3 className="font-display text-lg font-semibold tracking-tight text-stone-900 dark:text-white truncate">{teacher.name}</h3>
          <div className="text-xs text-stone-400 dark:text-stone-500">Lehrerin</div>
        </div>
      </div>

      <div className="relative flex items-center gap-2 mb-4 text-xs">
        <span className="px-2.5 py-1 rounded-full bg-stone-100 dark:bg-stone-800 text-stone-600 dark:text-stone-300 font-medium">{teacher.totalClasses} lớp</span>
        <span className="px-2.5 py-1 rounded-full bg-stone-100 dark:bg-stone-800 text-stone-600 dark:text-stone-300 font-medium">{teacher.totalSessions} buổi</span>
      </div>

      <div className="relative mb-4">
        <div className="flex items-center justify-between text-[11px] text-stone-400 dark:text-stone-500 mb-1.5">
          <span className="uppercase tracking-wider font-medium">Khối lượng</span>
          <span className="tabular-nums">{Math.round(teacher.totalSessions/maxLoad*100)}%</span>
        </div>
        <div className="h-1.5 rounded-full bg-stone-100 dark:bg-stone-800 overflow-hidden">
          <div className="h-full rounded-full" style={{ width: `${teacher.totalSessions/maxLoad*100}%`, background: c.dot }}></div>
        </div>
      </div>

      {(() => {
        const today = new Date(); today.setHours(0,0,0,0);
        const DAY_VN = ["CN","T2","T3","T4","T5","T6","T7"];
        const next = teacher.schedule.find(s => new Date(s.date) >= today);
        if (!next) return null;
        const d = new Date(next.date);
        const cl = classColor(next.classId);
        return (
          <div className="relative flex items-center gap-2 mb-4 px-3 py-2 rounded-xl bg-stone-50 dark:bg-stone-800/50 border border-stone-100 dark:border-stone-800">
            <span className="w-1 self-stretch rounded-full" style={{ background: cl.dot }}></span>
            <div className="flex-1 min-w-0">
              <div className="text-[10px] uppercase tracking-wider font-semibold text-stone-400 dark:text-stone-500">Buổi kế tiếp</div>
              <div className="text-xs font-semibold text-stone-700 dark:text-stone-200 truncate">{DAY_VN[d.getDay()]} {String(d.getDate()).padStart(2,"0")}/{String(d.getMonth()+1).padStart(2,"0")} · {next.classId}</div>
            </div>
          </div>
        );
      })()}

      <div className="relative flex flex-wrap gap-1.5 mb-4">
        {teacher.classes.map(cid => {
          const cl = classColor(cid);
          return (
            <span key={cid} className="inline-flex items-center gap-1.5 text-[11px] font-medium px-2 py-0.5 rounded-full border border-stone-150 dark:border-stone-800 bg-stone-50 dark:bg-stone-800/50">
              <span className="w-1.5 h-1.5 rounded-full" style={{ background: cl.dot }}></span>
              <span className="text-stone-600 dark:text-stone-300">{cid}</span>
            </span>
          );
        })}
      </div>

      <div className="relative flex items-center gap-1.5 text-sm font-medium text-accent-600 dark:text-accent-400 group-hover:gap-2.5 transition-all">
        <I.cal/> Xem lịch dạy <I.arrow/>
      </div>
    </div>
  );
}

/* ============ CALENDAR ============ */
/* Pool tất cả buổi học toàn trung tâm (mỗi buổi: ngày, lớp, giờ, các cô dạy) */
const ALL_SESSIONS = (() => {
  const map = {};
  TEACHERS.forEach(t => t.schedule.forEach(ss => {
    const k = ss.date + "|" + ss.classId;
    if (!map[k]) map[k] = { date: ss.date, classId: ss.classId, time: ss.time, teachers: [] };
    if (!map[k].teachers.includes(t.name)) map[k].teachers.push(t.name);
  }));
  return Object.values(map).sort((a,b) => a.date.localeCompare(b.date) || a.classId.localeCompare(b.classId));
})();

/* Modal chọn buổi dự giờ */
function AuditPicker({ owner, focusTeacher, audit, setAudit, onClose }) {
  const [q, setQ] = useState("");
  const [zoom] = useZoom();
  const today = new Date(); today.setHours(0,0,0,0);
  const ownKeys = new Set(owner.schedule.map(s => s.date + "|" + s.classId));
  const auditSet = new Set(audit);
  const DAY_VN = ["CN","T2","T3","T4","T5","T6","T7"];
  // Gom theo từng cô (hoặc chỉ 1 cô nếu mở từ lịch cô đó)
  const teacherList = focusTeacher ? [focusTeacher] : TEACHERS.filter(t => t.name !== owner.name);
  const groups = teacherList
    .map(t => ({
      t,
      sessions: t.schedule.filter(s => {
        if (new Date(s.date) < today) return false;
        if (ownKeys.has(s.date + "|" + s.classId)) return false;
        if (!q.trim()) return true;
        const n = q.toLowerCase();
        return s.classId.toLowerCase().includes(n) || t.name.toLowerCase().includes(n);
      })
    }))
    .filter(g => g.sessions.length > 0);

  const toggle = (k) => setAudit(a => a.includes(k) ? a.filter(x => x !== k) : [...a, k]);

  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-stone-900/50 dark:bg-black/80 backdrop-blur-sm fade-in" onClick={onClose}>
      <div className="bg-white dark:bg-stone-900 rounded-3xl w-full max-w-lg max-h-[85vh] overflow-hidden shadow-2xl border border-stone-200 dark:border-stone-800 flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="px-5 py-4 border-b border-stone-100 dark:border-stone-800">
          <div className="flex items-center justify-between gap-2">
            <div>
              <div className="font-display text-lg font-semibold text-stone-900 dark:text-white">Chọn buổi dự giờ</div>
              <div className="text-xs text-stone-400 dark:text-stone-500 mt-0.5">{focusTeacher ? `Dự giờ ${focusTeacher.name}` : "Theo giáo viên"} · đã chọn {audit.length} buổi</div>
            </div>
            <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 flex items-center justify-center text-stone-500"><I.x/></button>
          </div>
          <div className="mt-3"><SearchInput value={q} onChange={setQ} placeholder="Tìm lớp hoặc cô giáo…"/></div>
        </div>
        <div className="overflow-auto scrollbar-thin p-3 flex-1">
          {groups.length === 0 && <div className="text-center py-12 text-sm text-stone-400">Không có buổi nào.</div>}
          {groups.map(({ t, sessions }) => (
            <div key={t.name} className="mb-4">
              <div className="flex items-center gap-2 px-1 py-1.5 sticky top-0 bg-white/95 dark:bg-stone-900/95 backdrop-blur">
                <Avatar teacher={t} size="sm"/>
                <div className="text-sm font-semibold text-stone-800 dark:text-stone-100">{t.name}</div>
                <span className="text-xs text-stone-400">· {sessions.length} buổi</span>
              </div>
              <div className="space-y-1 mt-1">
                {sessions.map(s => {
                  const k = s.date + "|" + s.classId;
                  const on = auditSet.has(k);
                  const cl = classColor(s.classId);
                  const d = new Date(s.date);
                  return (
                    <button key={k} onClick={()=>toggle(k)}
                      className={`w-full flex items-center gap-3 px-3 py-2 rounded-xl border text-left transition ${
                        on ? "border-accent-400 bg-accent-50 dark:bg-accent-700/20 dark:border-accent-600" : "border-stone-150 dark:border-stone-800 hover:border-stone-300 dark:hover:border-stone-700"
                      }`}>
                      <span className={`w-5 h-5 rounded-md border-2 flex items-center justify-center flex-shrink-0 ${on ? "bg-accent-600 border-accent-600 text-white" : "border-stone-300 dark:border-stone-600"}`}>
                        {on && <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>}
                      </span>
                      <span className="w-1 self-stretch rounded-full" style={{ background: cl.dot }}></span>
                      <span className="flex-1 min-w-0">
                        <span className="block text-sm font-semibold text-stone-800 dark:text-stone-100 truncate">{s.classId}</span>
                        <span className="block text-xs text-stone-400 dark:text-stone-500 truncate">{DAY_VN[d.getDay()]} {formatDate(s.date)} · {s.time}</span>
                      </span>
                      {zoom[s.classId] && <span className="text-[10px] font-semibold text-[#2D8CFF] flex-shrink-0">Zoom</span>}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
        <div className="px-5 py-3 border-t border-stone-100 dark:border-stone-800 flex items-center justify-between">
          <button onClick={()=>{ if(window.confirm("Xoá hết các buổi đã chọn?")) setAudit([]); }} className="text-xs font-medium text-stone-400 hover:text-rose-600 transition">Xoá hết</button>
          <button onClick={onClose} className="px-4 py-2 rounded-full bg-accent-600 text-white text-sm font-medium hover:bg-accent-700 transition">Xong</button>
        </div>
      </div>
    </div>
  );
}

function CalendarModal({ teacher, onClose, user }) {
  const c = teacherColor(teacher);
  const [zoom] = useZoom();
  const AUDIT_OWNER = "Cô Khiết Quỳnh";
  const QUYNH = TEACHERS.find(t => t.name === AUDIT_OWNER);
  const isQuynh = teacher.name === AUDIT_OWNER;
  const canAudit = user === AUDIT_OWNER; // đăng nhập là Khiết Quỳnh → quản lý dự giờ ở mọi lịch
  const [idx, setIdx] = useState(0);
  const [pickerOpen, setPickerOpen] = useState(false);
  const [confirmDay, setConfirmDay] = useState(null); // {own:[...]} khi bấm 1 ngày

  // Dự giờ — lưu localStorage theo tên cô
  const STORAGE_KEY = "dz_audit_" + AUDIT_OWNER;
  const [audit, setAudit] = useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch (e) { return []; }
  });
  useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(audit)); } catch (e) {} }, [audit]);
  useEffect(() => {
    const h = () => { try { setAudit(JSON.parse(localStorage.getItem(STORAGE_KEY)) || []); } catch (e) {} };
    window.addEventListener("dz-sync", h);
    return () => window.removeEventListener("dz-sync", h);
  }, []);

  // các buổi dự giờ (đã chọn) -> object đầy đủ
  const myAudit = canAudit ? ALL_SESSIONS.filter(s => audit.includes(s.date + "|" + s.classId)) : [];
  const auditSessions = isQuynh ? myAudit : myAudit.filter(s => s.teachers.includes(teacher.name));

  // phạm vi tháng = gộp buổi dạy + buổi dự giờ
  const allDates = [...teacher.schedule.map(s => new Date(s.date)), ...auditSessions.map(s => new Date(s.date))].sort((a,b) => a-b);
  const minD = allDates[0]; const maxD = allDates[allDates.length-1];
  const months = [];
  let cur = new Date(minD.getFullYear(), minD.getMonth(), 1);
  while (cur <= maxD) { months.push(new Date(cur)); cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1); }
  const safeIdx = Math.min(idx, months.length-1);
  const month = months[safeIdx];
  const monthLabel = month.toLocaleDateString("vi-VN", { month: "long", year: "numeric" });

  const inMonth = (iso) => { const d = new Date(iso); return d.getFullYear()===month.getFullYear() && d.getMonth()===month.getMonth(); };
  const monthSessions = teacher.schedule.filter(s => inMonth(s.date));
  const monthAudit = auditSessions.filter(s => inMonth(s.date));

  const sessionByDay = {}; monthSessions.forEach(ss => { const d=new Date(ss.date).getDate(); (sessionByDay[d]=sessionByDay[d]||[]).push(ss); });
  const auditByDay = {};   monthAudit.forEach(ss => { const d=new Date(ss.date).getDate(); (auditByDay[d]=auditByDay[d]||[]).push(ss); });

  const firstWeekday = (new Date(month.getFullYear(), month.getMonth(), 1).getDay() + 6) % 7;
  const daysInMonth = new Date(month.getFullYear(), month.getMonth()+1, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const today = new Date();
  const isToday = (d) => today.getFullYear() === month.getFullYear() && today.getMonth() === month.getMonth() && today.getDate() === d;

  useEffect(()=> {
    const h = (e) => { if (e.key === "Escape") { if (pickerOpen) setPickerOpen(false); else onClose(); } };
    window.addEventListener("keydown", h);
    return ()=> window.removeEventListener("keydown", h);
  }, [pickerOpen]);

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-stone-900/40 dark:bg-black/70 backdrop-blur-sm fade-in" onClick={onClose}>
      <div className="bg-white dark:bg-stone-900 rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-hidden shadow-2xl border border-stone-200 dark:border-stone-800 flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="px-6 py-4 border-b border-stone-100 dark:border-stone-800 flex items-center gap-3.5">
          <Avatar teacher={teacher} size="lg"/>
          <div className="flex-1 min-w-0">
            <div className="font-display text-lg font-semibold tracking-tight text-stone-900 dark:text-white">{teacher.name}</div>
            <div className="text-xs text-stone-400 dark:text-stone-500">Kalender · {teacher.totalSessions} buổi · {teacher.totalClasses} lớp{canAudit && audit.length>0 && <span> · <span className="text-accent-600 dark:text-accent-400 font-medium">{audit.length} dự giờ</span></span>}</div>
          </div>
          {canAudit && (
          <button onClick={()=>setPickerOpen(true)} className="px-3 py-2 rounded-full bg-accent-50 dark:bg-accent-700/20 text-accent-700 dark:text-accent-300 text-xs font-semibold hover:bg-accent-100 dark:hover:bg-accent-700/30 transition flex items-center gap-1.5 border border-accent-200 dark:border-accent-700/40">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            Dự giờ
          </button>
          )}
          <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 flex items-center justify-center text-stone-500"><I.x/></button>
        </div>

        <div className="px-6 py-3 flex items-center justify-between border-b border-stone-100 dark:border-stone-800">
          <button disabled={safeIdx===0} onClick={()=>setIdx(i=>Math.max(0,i-1))} className="w-8 h-8 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center text-stone-500"><I.chevL/></button>
          <div className="font-display font-medium text-base capitalize text-stone-900 dark:text-white">{monthLabel}</div>
          <button disabled={safeIdx===months.length-1} onClick={()=>setIdx(i=>Math.min(months.length-1,i+1))} className="w-8 h-8 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center text-stone-500"><I.chevR/></button>
        </div>

        <div className="grid lg:grid-cols-[1fr_290px] overflow-hidden flex-1 min-h-0">
          <div className="p-6 overflow-auto scrollbar-thin">
            {canAudit && !isQuynh && (
              <div className="mb-3 text-xs text-accent-700 dark:text-accent-300 bg-accent-50 dark:bg-accent-700/15 rounded-lg px-3 py-2 flex items-center gap-1.5">
                <span>💡</span> Bấm vào ngày có lớp để đăng ký / bỏ dự giờ.
              </div>
            )}
            <div className="grid grid-cols-7 gap-1.5 text-center text-[11px] font-semibold text-stone-400 dark:text-stone-500 uppercase tracking-wider mb-2">
              {["T2","T3","T4","T5","T6","T7","CN"].map(d => <div key={d}>{d}</div>)}
            </div>
            <div className="grid grid-cols-7 gap-1.5">
              {cells.map((d, i) => {
                if (!d) return <div key={i} className="aspect-square"></div>;
                const own = sessionByDay[d] || [];
                const aud = auditByDay[d] || [];
                const hasOwn = own.length > 0;
                const hasAud = aud.length > 0;
                const cl = hasOwn ? classColor(own[0].classId) : null;
                const style = hasOwn ? { ['--bg-l']:cl.bg, ['--bg-d']:cl.bgDark, ['--text-l']:cl.text, ['--text-d']:cl.textDark } : {};
                // Bấm để dự giờ: chỉ khi đăng nhập là Khiết Quỳnh và đang xem lịch cô KHÁC, ngày đó có lớp
                const canClick = canAudit && !isQuynh && hasOwn;
                const onClickCell = canClick ? () => setConfirmDay({ own }) : undefined;
                return (
                  <div key={i} style={style}
                    onClick={onClickCell}
                    title={canClick ? (hasAud ? "Bỏ dự giờ" : "Bấm để dự giờ") : undefined}
                    className={`aspect-square rounded-xl p-1.5 flex flex-col gap-0.5 text-left transition relative ${canClick ? "cursor-pointer" : ""} ${
                      hasOwn ? "cal-cell hover:scale-[1.04]"
                             : hasAud ? "border-2 border-dashed border-accent-400 text-accent-700 dark:text-accent-300 dark:border-accent-500"
                             : "text-stone-500 dark:text-stone-300 bg-stone-100/70 dark:bg-stone-800/40 hover:bg-stone-200 dark:hover:bg-stone-800"
                    } ${hasAud && hasOwn ? "ring-2 ring-accent-500 ring-offset-2 ring-offset-white dark:ring-offset-stone-900" : ""} ${isToday(d) ? "ring-2 ring-stone-900 dark:ring-white ring-offset-2 ring-offset-white dark:ring-offset-stone-900" : ""}`}>
                    <div className="text-[13px] font-bold">{d}</div>
                    {hasOwn && <div className="text-[9px] leading-tight truncate font-medium opacity-90">{own[0].classId.replace("DZ-","").replace("Ôn-tập-","Ôn ")}{own.length>1 && ` +${own.length-1}`}</div>}
                    {!hasOwn && hasAud && <div className="text-[9px] leading-tight truncate font-medium">{aud[0].classId.replace("DZ-","").replace("Ôn-tập-","Ôn ")}</div>}
                    {hasAud && <span className="absolute top-0.5 right-1 text-[8px] font-bold text-accent-700 dark:text-accent-200 bg-white/70 dark:bg-black/30 rounded px-0.5">✓DT</span>}
                  </div>
                );
              })}
            </div>
            <div className="mt-5 pt-4 border-t border-stone-100 dark:border-stone-800">
              <div className="text-[11px] font-semibold text-stone-400 dark:text-stone-500 uppercase tracking-wider mb-2">Chú thích</div>
              <div className="flex flex-wrap gap-x-4 gap-y-2 text-xs">
                {teacher.classes.map(cid => {
                  const cl = classColor(cid);
                  return <div key={cid} className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-md" style={{ background: cl.dot }}></span><span className="text-stone-600 dark:text-stone-300 font-medium">{cid}</span></div>;
                })}
                {canAudit && audit.length>0 && <div className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-md border-2 border-dashed border-accent-500"></span><span className="text-accent-600 dark:text-accent-300 font-medium">Dự giờ</span></div>}
              </div>
            </div>
          </div>

          <div className="border-t lg:border-t-0 lg:border-l border-stone-100 dark:border-stone-800 overflow-auto scrollbar-thin bg-stone-50/50 dark:bg-stone-950/30">
            <div className="px-4 py-3 sticky top-0 bg-white/90 dark:bg-stone-900/90 backdrop-blur border-b border-stone-100 dark:border-stone-800">
              <div className="text-[11px] font-semibold text-stone-400 dark:text-stone-500 uppercase tracking-wider">Tháng {month.getMonth()+1}</div>
              <div className="text-sm font-display font-semibold text-stone-900 dark:text-white mt-0.5">{monthSessions.length} buổi dạy{monthAudit.length>0 && ` · ${monthAudit.length} dự giờ`}</div>
            </div>
            <div className="p-3 space-y-1.5">
              {monthSessions.length === 0 && monthAudit.length === 0 && <div className="text-sm text-stone-400 text-center py-10">Không có buổi nào.</div>}
              {monthSessions.map((sess, i) => {
                const cls = CLASSES.find(c => c.id === sess.classId);
                const cl = classColor(sess.classId);
                return (
                  <div key={"o"+i} className="flex gap-2.5 px-2.5 py-2 rounded-xl bg-white dark:bg-stone-900 border border-stone-100 dark:border-stone-800 hover:border-stone-200 dark:hover:border-stone-700 transition">
                    <span className="w-1 rounded-full self-stretch flex-shrink-0" style={{ background: cl.dot }}></span>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-start justify-between gap-2 mb-0.5">
                        <div className="text-sm font-semibold text-stone-800 dark:text-stone-100 truncate">{sess.classId}</div>
                        {cls && <LevelChip level={cls.level}/>}
                      </div>
                      <div className="text-xs text-stone-400 dark:text-stone-500 tabular-nums">{formatDate(sess.date)} · {sess.time}</div>
                    </div>
                    {zoom[sess.classId] && (
                      <a href={zoom[sess.classId]} target="_blank" rel="noopener noreferrer" title="Vào Zoom" className="self-center flex-shrink-0 w-7 h-7 rounded-full bg-[#2D8CFF]/10 text-[#2D8CFF] hover:bg-[#2D8CFF] hover:text-white flex items-center justify-center transition"><I.video/></a>
                    )}
                  </div>
                );
              })}
              {monthAudit.length > 0 && (
                <div className="pt-2">
                  <div className="px-1 pb-1 text-[11px] font-semibold text-accent-600 dark:text-accent-400 uppercase tracking-wider">Dự giờ</div>
                  {monthAudit.map((sess, i) => {
                    const cls = CLASSES.find(c => c.id === sess.classId);
                    const others = sess.teachers.filter(t => t !== teacher.name);
                    return (
                      <div key={"a"+i} className="flex gap-2.5 px-2.5 py-2 rounded-xl border-2 border-dashed border-accent-300 dark:border-accent-700/60 bg-accent-50/40 dark:bg-accent-700/10 mb-1.5">
                        <div className="flex-1 min-w-0">
                          <div className="flex items-start justify-between gap-2 mb-0.5">
                            <div className="text-sm font-semibold text-stone-800 dark:text-stone-100 truncate">{sess.classId}</div>
                            {cls && <LevelChip level={cls.level}/>}
                          </div>
                          <div className="text-xs text-stone-400 dark:text-stone-500 tabular-nums">{formatDate(sess.date)} · {sess.time}{others.length>0 && ` · ${others.join(", ")}`}</div>
                        </div>
                        {zoom[sess.classId] ? (
                          <a href={zoom[sess.classId]} target="_blank" rel="noopener noreferrer" title="Vào Zoom" className="self-center flex-shrink-0 inline-flex items-center gap-1 px-2.5 py-1 rounded-full bg-[#2D8CFF] text-white text-[11px] font-semibold hover:bg-[#2476d6] transition"><I.video/> Zoom</a>
                        ) : (
                          <span className="self-center flex-shrink-0 text-[10px] text-stone-400 dark:text-stone-500">chưa có link</span>
                        )}
                        <button onClick={()=>{ if(window.confirm("Bỏ buổi dự giờ này?")) setAudit(a=>a.filter(x=>x!==sess.date+"|"+sess.classId)); }} className="self-center text-stone-300 hover:text-rose-500 transition flex-shrink-0"><I.x/></button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
      {pickerOpen && <AuditPicker owner={QUYNH} focusTeacher={isQuynh ? null : teacher} audit={audit} setAudit={setAudit} onClose={()=>setPickerOpen(false)}/>}

      {confirmDay && (() => {
        const own = confirmDay.own;
        const keys = own.map(o => o.date + "|" + o.classId);
        const isAud = keys.every(k => audit.includes(k));
        const s0 = own[0];
        const cc = classColor(s0.classId);
        const others = (ALL_SESSIONS.find(x => x.date === s0.date && x.classId === s0.classId)?.teachers || []).filter(t => t !== AUDIT_OWNER);
        const doConfirm = () => {
          setAudit(a => isAud ? a.filter(k => !keys.includes(k)) : [...new Set([...a, ...keys])]);
          setConfirmDay(null);
        };
        return (
          <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-stone-900/40 dark:bg-black/70 backdrop-blur-sm fade-in" onClick={()=>setConfirmDay(null)}>
            <div className="bg-white dark:bg-stone-900 rounded-3xl w-full max-w-xs overflow-hidden shadow-2xl border border-stone-200 dark:border-stone-800" onClick={e=>e.stopPropagation()}>
              <div className="px-5 pt-5 pb-3 text-center">
                <div className="text-3xl mb-2">{isAud ? "🗑️" : "📌"}</div>
                <div className="font-display text-lg font-semibold text-stone-900 dark:text-white">{isAud ? "Bỏ dự giờ?" : "Dự giờ buổi này?"}</div>
              </div>
              <div className="px-5 pb-2">
                <div className="flex items-center gap-2.5 px-3 py-2.5 rounded-xl border border-stone-100 dark:border-stone-800 bg-stone-50 dark:bg-stone-800/40">
                  <span className="w-1 self-stretch rounded-full" style={{ background: cc.dot }}></span>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-semibold text-stone-800 dark:text-stone-100">{s0.classId}</div>
                    <div className="text-xs text-stone-400 dark:text-stone-500">{formatDate(s0.date)} · {s0.time}{others.length>0 && ` · ${others.join(", ")}`}</div>
                  </div>
                </div>
                <div className="mt-2 flex items-center justify-between px-1">
                  <span className="text-xs text-stone-400 dark:text-stone-500">Link Zoom</span>
                  {zoom[s0.classId] ? (
                    <a href={zoom[s0.classId]} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 text-xs font-semibold text-[#2D8CFF] hover:underline"><I.video/> Vào Zoom</a>
                  ) : (
                    <span className="text-xs text-stone-400 dark:text-stone-500">Chưa có · thêm ở trang Lớp học</span>
                  )}
                </div>
              </div>
              <div className="px-5 py-4 flex gap-2">
                <button onClick={()=>setConfirmDay(null)} className="flex-1 py-2 rounded-full text-sm font-medium border border-stone-200 dark:border-stone-800 hover:bg-stone-100 dark:hover:bg-stone-800 transition">Huỷ</button>
                <button onClick={doConfirm} className={`flex-1 py-2 rounded-full text-sm font-semibold text-white transition ${isAud ? "bg-rose-600 hover:bg-rose-700" : "bg-accent-600 hover:bg-accent-700"}`}>{isAud ? "Bỏ dự giờ" : "Dự giờ"}</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function AuditDashboard() {
  const [zoom] = useZoom();
  const [list, setList] = useState(loadAudit);
  const [done, setDone] = useState(loadDone);
  const [notes, setNotes] = useState(loadNotes);
  const [editingNote, setEditingNote] = useState(null); // { sess }
  const [mIdx, setMIdx] = useState(0);
  const [dayInfo, setDayInfo] = useState(null);
  const DAY_VN = ["CN","T2","T3","T4","T5","T6","T7"];
  useEffect(() => {
    const h = () => { setList(loadAudit()); setDone(loadDone()); setNotes(loadNotes()); };
    window.addEventListener("dz-sync", h);
    return () => window.removeEventListener("dz-sync", h);
  }, []);
  const saveNoteFor = (key, text) => {
    setNotes(prev => {
      const next = { ...prev };
      if (text) next[key] = text; else delete next[key];
      saveNotes(next);
      return next;
    });
  };
  const saveList = (next) => { setList(next); try { localStorage.setItem(AUDIT_KEY, JSON.stringify(next)); } catch (e) {} };
  const saveDone = (next) => { setDone(next); try { localStorage.setItem(AUDIT_DONE_KEY, JSON.stringify(next)); } catch (e) {} };
  const remove = (k) => { if (!window.confirm("Bỏ buổi này khỏi danh sách dự giờ?")) return; saveList(list.filter(x => x !== k)); saveDone(done.filter(x => x !== k)); };
  const markDone = (k) => { if (window.confirm("Xác nhận: bạn đã dự giờ buổi này?")) saveDone([...done, k]); };
  const unmark = (k) => { if (window.confirm("Bỏ đánh dấu đã dự buổi này?")) saveDone(done.filter(x => x !== k)); };
  const joinZoom = (s) => {
    const url = zoom[s.classId];
    if (!url) return;
    // Tính thời điểm bắt đầu (giờ Việt Nam UTC+7)
    const startStr = (s.time || "").split(/[–-]/)[0].trim();
    const [hh, mm] = startStr.split(":").map(n => parseInt(n) || 0);
    const startTs = new Date(`${s.date}T${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}:00+07:00`).getTime();
    const inWindow = Date.now() >= (startTs - 30 * 60 * 1000); // từ 30 phút trước trở đi
    const msg = inWindow
      ? "Vào phòng Zoom của lớp này?\n(Buổi sẽ được tự đánh dấu ✓ Đã dự)"
      : "Còn sớm — chưa tới 30 phút trước giờ học.\nVẫn vào phòng Zoom?\n(Buổi sẽ KHÔNG tự đánh dấu Đã dự, có thể đánh dấu thủ công sau.)";
    if (window.confirm(msg)) {
      window.open(url, "_blank", "noopener");
      if (inWindow) saveDone([...new Set([...done, s.date + "|" + s.classId])]);
    }
  };

  const today = new Date(); today.setHours(0,0,0,0);
  const doneSet = new Set(done);
  const sessions = ALL_SESSIONS.filter(s => list.includes(s.date + "|" + s.classId)).sort((a,b) => a.date.localeCompare(b.date));
  const pending = sessions.filter(s => !doneSet.has(s.date + "|" + s.classId));
  const attended = sessions.filter(s => doneSet.has(s.date + "|" + s.classId));
  const classes = [...new Set(sessions.map(s => s.classId))];
  const byTeacher = TEACHERS.filter(t => t.name !== "Cô Khiết Quỳnh")
    .map(t => ({ t, count: sessions.filter(s => s.teachers.includes(t.name)).length }))
    .filter(x => x.count > 0).sort((a,b) => b.count - a.count);
  const byMonth = (() => {
    const m = {};
    sessions.forEach(s => {
      const d = new Date(s.date);
      const key = (d.getMonth()+1) + "/" + d.getFullYear();
      if (!m[key]) m[key] = { key, total: 0, done: 0, sort: d.getFullYear()*12 + d.getMonth() };
      m[key].total++;
      if (doneSet.has(s.date + "|" + s.classId)) m[key].done++;
    });
    return Object.values(m).sort((a,b) => a.sort - b.sort);
  })();

  const Row = ({ s, attended }) => {
    const cl = classColor(s.classId);
    const d = new Date(s.date);
    const others = s.teachers.filter(t => t !== "Cô Khiết Quỳnh");
    const k = s.date + "|" + s.classId;
    const sLocal = (() => { const [yy,mm,dd] = s.date.split("-").map(Number); return new Date(yy, mm-1, dd); })();
    const isFuture = sLocal > today;
    const daysLeft = Math.round((sLocal - today) / 86400000);
    const soon = daysLeft <= 3;
    const note = notes[k] || "";
    return (
      <div className={`px-3 py-2.5 rounded-xl border border-stone-100 dark:border-stone-800 bg-white dark:bg-stone-900 card-shadow ${attended ? "opacity-70" : ""}`}>
        <div className="flex items-center gap-3">
          <div className="flex flex-col items-center justify-center w-12 h-12 rounded-xl flex-shrink-0" style={{ background: cl.bg, color: cl.text }}>
            <div className="text-[9px] font-bold uppercase opacity-70">{DAY_VN[d.getDay()]}</div>
            <div className="text-sm font-display leading-none">{d.getDate()}/{d.getMonth()+1}</div>
          </div>
          <div className={`flex-1 min-w-0 ${zoom[s.classId] ? "cursor-pointer" : ""}`} onClick={zoom[s.classId] ? ()=>joinZoom(s) : undefined} title={zoom[s.classId] ? "Bấm để vào Zoom" : undefined}>
            <div className="flex items-center gap-2">
              <div className="text-sm font-semibold text-stone-800 dark:text-stone-100 truncate">{s.classId}</div>
              {attended && <span className="flex-shrink-0 text-[10px] font-semibold px-1.5 py-0.5 rounded-full bg-emerald-100 text-emerald-700 dark:bg-emerald-500/15 dark:text-emerald-300">✓ Đã dự</span>}
            </div>
            <div className="text-xs text-stone-400 dark:text-stone-500 truncate">{s.time} · {others.join(", ")}</div>
          </div>
          {zoom[s.classId] ? (
            <button onClick={()=>joinZoom(s)} className="flex-shrink-0 inline-flex items-center gap-1 px-2.5 py-1 rounded-full bg-[#2D8CFF] text-white text-[11px] font-semibold hover:bg-[#2476d6] transition"><I.video/> Zoom</button>
          ) : (
            <span className="flex-shrink-0 text-[10px] text-stone-400 dark:text-stone-500">chưa có link</span>
          )}
          {attended ? (
            <button onClick={()=>unmark(k)} className="flex-shrink-0 text-[11px] font-medium text-stone-400 hover:text-stone-700 dark:hover:text-stone-200 transition">Hoàn tác</button>
          ) : isFuture ? (
            <span className={`flex-shrink-0 inline-flex items-center gap-1 text-[10px] font-semibold px-2 py-1 rounded-full ${soon ? "bg-amber-100 text-amber-700 dark:bg-amber-500/15 dark:text-amber-300" : "bg-stone-100 text-stone-500 dark:bg-stone-800 dark:text-stone-400"}`}>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
              {daysLeft === 1 ? "Ngày mai" : `Sắp diễn ra · ${daysLeft} ngày`}
            </span>
          ) : (
            <button onClick={()=>markDone(k)} title="Đánh dấu đã dự" className="flex-shrink-0 inline-flex items-center gap-1 px-2.5 py-1.5 rounded-full bg-emerald-600 text-white text-[11px] font-semibold hover:bg-emerald-700 transition"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg> Đã dự</button>
          )}
          <button onClick={()=>setEditingNote(s)} title={note ? "Sửa ghi chú" : "Thêm ghi chú"} className={`flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center transition ${note ? "text-amber-600 hover:bg-amber-50 dark:hover:bg-amber-500/10" : "text-stone-300 hover:text-stone-600 hover:bg-stone-100 dark:hover:bg-stone-800"}`}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
          </button>
          <button onClick={()=>remove(k)} title="Bỏ khỏi danh sách" className="flex-shrink-0 w-7 h-7 rounded-full text-stone-300 hover:text-rose-500 hover:bg-stone-100 dark:hover:bg-stone-800 flex items-center justify-center transition"><I.x/></button>
        </div>
        {note && (
          <div onClick={()=>setEditingNote(s)} className="mt-2 ml-[3.75rem] pl-3 border-l-2 border-amber-300 dark:border-amber-700/60 text-xs text-stone-600 dark:text-stone-300 italic whitespace-pre-wrap cursor-pointer hover:text-stone-800 dark:hover:text-stone-100 transition" title="Bấm để sửa">📝 {note}</div>
        )}
      </div>
    );
  };

  // Lịch tháng cho các buổi dự giờ
  const cal = (() => {
    if (!sessions.length) return null;
    const ds = sessions.map(s => new Date(s.date)).sort((a,b) => a-b);
    const months = [];
    let cur = new Date(ds[0].getFullYear(), ds[0].getMonth(), 1);
    const last = ds[ds.length-1];
    while (cur <= last) { months.push(new Date(cur)); cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1); }
    const safe = Math.min(mIdx, months.length-1);
    const month = months[safe];
    const byDay = {};
    sessions.forEach(s => { const d = new Date(s.date); if (d.getFullYear()===month.getFullYear() && d.getMonth()===month.getMonth()) (byDay[d.getDate()] = byDay[d.getDate()] || []).push(s); });
    const fw = (new Date(month.getFullYear(), month.getMonth(), 1).getDay()+6)%7;
    const dim = new Date(month.getFullYear(), month.getMonth()+1, 0).getDate();
    const cells = [];
    for (let i=0;i<fw;i++) cells.push(null);
    for (let d=1;d<=dim;d++) cells.push(d);
    return { months, safe, month, byDay, cells };
  })();

  return (
    <div className="max-w-6xl mx-auto px-6 py-10 fade-in">
      <AuditHero/>
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8">
        {[
          { label:"Tổng buổi", value: sessions.length, dot:"#3a8a5a" },
          { label:"Cần dự", value: pending.length, dot:"#c08b2e" },
          { label:"Đã dự", value: attended.length, dot:"#5e7e73" },
          { label:"Số lớp", value: classes.length, dot:"#3878b8" },
        ].map(s => (
          <div key={s.label} className="relative rounded-lg border border-stone-100 dark:border-stone-800 bg-white dark:bg-stone-900 px-4 py-3.5 card-shadow hover-lift overflow-hidden">
            <div className="absolute right-0 top-0 w-20 h-20 rounded-full blur-2xl opacity-25 -mr-6 -mt-6" style={{ background: s.dot }}></div>
            <div className="relative flex items-center gap-1.5"><span className="w-2 h-2 rounded-full" style={{ background: s.dot }}></span><span className="text-[11px] font-medium uppercase tracking-wider text-stone-400 dark:text-stone-500">{s.label}</span></div>
            <div className="relative font-display text-2xl font-bold text-stone-900 dark:text-white mt-1 tabular-nums">{s.value}</div>
          </div>
        ))}
      </div>

      {sessions.length === 0 && (
        <div className="text-center py-12">
          <MemeCat variant="sleepy" className="w-28 h-28 mx-auto opacity-70"/>
          <div className="mt-3 text-sm text-stone-400 dark:text-stone-500">
            Chưa đăng ký buổi dự giờ nào.<br/>Vào tab <b>Giáo viên</b> → mở lịch một cô → bấm <b>“＋ Dự giờ”</b>.
          </div>
        </div>
      )}

      {byTeacher.length > 0 && (
        <div className="mb-8">
          <h2 className="font-display text-lg font-semibold text-stone-900 dark:text-white mb-3">Theo giáo viên</h2>
          <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
            {byTeacher.map(({ t, count }) => (
              <div key={t.name} className="flex items-center gap-3 rounded-lg border border-stone-100 dark:border-stone-800 bg-white dark:bg-stone-900 px-4 py-3 card-shadow">
                <Avatar teacher={t} size="md"/>
                <div className="min-w-0">
                  <div className="text-sm font-medium text-stone-800 dark:text-stone-100 truncate">{t.name}</div>
                  <div className="text-xs text-stone-400">{count} buổi dự</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {byMonth.length > 0 && (
        <div className="mb-8">
          <h2 className="font-display text-lg font-semibold text-stone-900 dark:text-white mb-3">Theo tháng</h2>
          <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
            {byMonth.map(m => (
              <div key={m.key} className="rounded-lg border border-stone-100 dark:border-stone-800 bg-white dark:bg-stone-900 px-4 py-3.5 card-shadow">
                <div className="text-[11px] font-medium uppercase tracking-wider text-stone-400 dark:text-stone-500">Tháng {m.key}</div>
                <div className="font-display text-2xl font-semibold text-stone-900 dark:text-white mt-1 tabular-nums">{m.total} <span className="text-sm font-sans font-normal text-stone-400">buổi</span></div>
                <div className="text-xs text-emerald-600 dark:text-emerald-400 mt-0.5 font-medium">✓ {m.done} đã dự{m.total-m.done>0 && ` · còn ${m.total-m.done}`}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {cal && (
        <div className="mb-8 max-w-md">
          <div className="flex items-center justify-between mb-3">
            <h2 className="font-display text-lg font-semibold text-stone-900 dark:text-white">Lịch dự giờ</h2>
            <div className="flex items-center gap-1.5">
              <button disabled={cal.safe===0} onClick={()=>setMIdx(i=>Math.max(0,i-1))} className="w-8 h-8 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center text-stone-500"><I.chevL/></button>
              <span className="text-sm font-medium capitalize w-36 text-center text-stone-700 dark:text-stone-200">{cal.month.toLocaleDateString("vi-VN",{month:"long",year:"numeric"})}</span>
              <button disabled={cal.safe===cal.months.length-1} onClick={()=>setMIdx(i=>Math.min(cal.months.length-1,i+1))} className="w-8 h-8 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center text-stone-500"><I.chevR/></button>
            </div>
          </div>
          <div className="rounded-lg border border-stone-100 dark:border-stone-800 bg-white dark:bg-stone-900 p-4 card-shadow">
            <div className="grid grid-cols-7 gap-1.5 text-center text-[11px] font-semibold text-stone-400 dark:text-stone-500 uppercase tracking-wider mb-2">
              {["T2","T3","T4","T5","T6","T7","CN"].map(d => <div key={d}>{d}</div>)}
            </div>
            <div className="grid grid-cols-7 gap-1.5">
              {cal.cells.map((d, i) => {
                if (!d) return <div key={i} className="aspect-square"></div>;
                const dlist = cal.byDay[d] || [];
                const has = dlist.length > 0;

        <NoteEditor
          sessionKey={editingNote.date + "|" + editingNote.classId}

          initialValue={notes[editingNote.date + "|" + editingNote.classId] || ""}
          onClose={()=>setEditingNote(null)}
          onSave={(text) => saveNoteFor(editingNote.date + "|" + editingNote.classId, text)}
        />
      )}
    </div>
  );
}

function SlipModal({ teacher, audit, onClose }) {
  const [zoom] = useZoom();
  const DAY_VN = ["CN","T2","T3","T4","T5","T6","T7"];
  const sessions = ALL_SESSIONS.filter(s => audit.includes(s.date + "|" + s.classId)).sort((a,b) => a.date.localeCompare(b.date));

  const buildText = () => {
    const lines = [];
    lines.push("📋 PHIẾU LỊCH DỰ THÍNH");
    lines.push("DEUTSCHE ZEIT · Sprachzentrum");
    lines.push("");
    lines.push("Kính gửi: " + teacher.name);
    lines.push("Tổng: " + sessions.length + " buổi");
    lines.push("──────────────────────");
    sessions.forEach((s, i) => {
      const d = new Date(s.date);
      const others = (s.teachers || []).filter(x => x !== teacher.name).join(", ");
      lines.push((i+1) + ". " + DAY_VN[d.getDay()] + " " + formatDate(s.date) + " · " + s.time);
      lines.push("   Lớp: " + s.classId + (others ? " · Cô dạy: " + others : ""));
      if (zoom[s.classId]) lines.push("   🎥 Zoom: " + zoom[s.classId]);
    });
    lines.push("──────────────────────");
    lines.push("Vui lòng vào đúng giờ. Cảm ơn cô! 🌸");
    return lines.join("\n");
  };

  const copyText = async () => {
    const text = buildText();
    try { await navigator.clipboard.writeText(text); alert("✓ Đã sao chép phiếu. Dán vào Zalo/Email/Messenger để gửi cho cô."); }
    catch (e) { alert("Không sao chép được. Bạn có thể chọn thủ công bằng cách bôi đen nội dung phiếu."); }
  };
  const doPrint = () => window.print();

  useEffect(() => {
    const h = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  return (
    <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-stone-900/50 dark:bg-black/80 backdrop-blur-sm fade-in" onClick={onClose}>
      <div className="bg-white dark:bg-stone-900 rounded-3xl w-full max-w-md max-h-[92vh] overflow-hidden shadow-2xl border border-stone-200 dark:border-stone-800 flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="px-5 py-3.5 border-b border-stone-100 dark:border-stone-800 flex items-center justify-between print:hidden">
          <div className="font-display text-base font-bold text-stone-900 dark:text-white">Phiếu lịch dự thính</div>
          <button onClick={onClose} className="w-8 h-8 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 flex items-center justify-center text-stone-500"><I.x/></button>
        </div>

        <div className="print-area overflow-auto p-6 bg-white text-stone-800 flex-1">
          <div className="text-center mb-5">
            <div className="text-[10px] uppercase tracking-[0.25em] text-stone-400 font-bold">Deutsche Zeit · Sprachzentrum</div>
            <div className="font-display text-xl font-extrabold mt-1 text-[#2c2e7a]">📋 PHIẾU LỊCH DỰ THÍNH</div>
          </div>
          <div className="flex items-center gap-3 mb-4 pb-4 border-b border-stone-200">
            <Avatar teacher={teacher} size="lg"/>
            <div className="flex-1 min-w-0">
              <div className="text-xs text-stone-500">Kính gửi</div>
              <div className="font-bold text-base text-stone-900">{teacher.name}</div>
              <div className="text-xs text-stone-500 mt-0.5">Tổng: <b>{sessions.length} buổi</b></div>
            </div>
          </div>
          {sessions.length === 0 ? (
            <div className="text-center text-sm text-stone-400 py-8">Chưa có buổi nào.</div>
          ) : (
            <div className="space-y-2">
              {sessions.map((s, i) => {
                const d = new Date(s.date);
                const cl = classColor(s.classId);
                const others = (s.teachers || []).filter(x => x !== teacher.name).join(", ");
                return (
                  <div key={s.date + s.classId} className="flex gap-3 p-2.5 rounded-lg border border-stone-100" style={{ borderLeft: "4px solid " + cl.dot }}>
                    <div className="flex flex-col items-center justify-center w-12 h-12 rounded-lg flex-shrink-0" style={{ background: cl.bg, color: cl.text }}>
                      <div className="text-[9px] font-bold uppercase opacity-70">{DAY_VN[d.getDay()]}</div>
                      <div className="text-sm font-bold leading-none">{String(d.getDate()).padStart(2,"0")}/{String(d.getMonth()+1).padStart(2,"0")}</div>
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-bold text-stone-900">{s.classId}</div>
                      <div className="text-xs text-stone-500">{s.time}{others && " · " + others}</div>
                      {zoom[s.classId] && (
                        <div className="text-[11px] text-[#2D8CFF] font-semibold mt-0.5 truncate">🎥 {zoom[s.classId]}</div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          <div className="mt-5 pt-4 border-t border-stone-200 text-xs text-stone-500 text-center italic">Vui lòng vào đúng giờ. Cảm ơn cô! 🌸</div>
        </div>

        <div className="px-5 py-3 border-t border-stone-100 dark:border-stone-800 flex gap-2 print:hidden">
          <button onClick={copyText} className="flex-1 py-2 rounded-full border border-stone-200 dark:border-stone-700 hover:bg-stone-100 dark:hover:bg-stone-800 text-sm font-medium transition">Sao chép</button>
          <button onClick={doPrint} className="flex-1 py-2 rounded-full bg-accent-600 hover:bg-accent-700 text-white text-sm font-semibold transition">In / Lưu PDF</button>
        </div>
      </div>
    </div>
  );

function SchedulerPage() {
  const [zoom] = useZoom();
  const [sched, setSched] = useState(loadSched);
  const [pickerFor, setPickerFor] = useState(null);
  const [slipFor, setSlipFor] = useState(null);
  const DAY_VN = ["CN","T2","T3","T4","T5","T6","T7"];
  useEffect(() => {
    const h = () => setSched(loadSched());
    window.addEventListener("dz-sync", h);
    return () => window.removeEventListener("dz-sync", h);
  }, []);

  const updateFor = (name, listOrFn) => {
    setSched(prev => {
      const cur = prev[name] || [];
      const next = typeof listOrFn === "function" ? listOrFn(cur) : listOrFn;
      const m = { ...prev, [name]: next };
      saveSched(m);
      return m;
    });
  };

  const total = Object.values(sched).reduce((a, v) => a + (v ? v.length : 0), 0);
  const participating = Object.keys(sched).filter(k => sched[k] && sched[k].length > 0).length;

  return (
    <div className="max-w-6xl mx-auto px-6 py-10 fade-in">
      <PageHeader
        kicker="Quản lý"
        title="Xếp lịch dự thính"
        subtitle="Phân công các cô dự thính qua lại"
        stats={[
          { label:"Tổng phân công", value: total },
          { label:"Cô tham gia", value: participating },
          { label:"Tổng giáo viên", value: TEACHERS.length },
          { label:"Lớp đang chạy", value: CLASSES.filter(c=>c.status!=="finished").length },
        ]}
      />


      <div className="space-y-3">
        {TEACHERS.map(t => {
          const list = sched[t.name] || [];
          const sessions = ALL_SESSIONS.filter(s => list.includes(s.date + "|" + s.classId)).sort((a,b)=>a.date.localeCompare(b.date));
          return (
            <div key={t.name} className="rounded-lg border border-stone-100 dark:border-stone-800 bg-white dark:bg-stone-900 p-4 sm:p-5 card-shadow hover-lift">
              <div className="flex items-center gap-4">
                <Avatar teacher={t} size="lg"/>
                <div className="flex-1 min-w-0">
                  <div className="font-display text-lg font-bold text-stone-900 dark:text-white truncate">{t.name}</div>
                  <div className="text-xs text-stone-500 dark:text-stone-400">Đi dự: <b className="text-stone-700 dark:text-stone-200">{list.length} buổi</b></div>
                </div>
                <div className="flex items-center gap-2">
                  {list.length > 0 && (
                    <button onClick={()=>setSlipFor(t)} className="px-3 py-2 rounded-full border border-stone-200 dark:border-stone-700 hover:bg-stone-100 dark:hover:bg-stone-800 text-sm font-medium transition flex items-center gap-1.5">
                      📋 Phiếu
                    </button>
                  )}
                  <button onClick={()=>setPickerFor(t)} className="px-3.5 py-2 rounded-full bg-accent-600 hover:bg-accent-700 text-white text-sm font-semibold transition flex items-center gap-1.5">
                    <I.plus/> Xếp lịch
                  </button>
                </div>
              </div>
              {sessions.length > 0 && (
                <div className="mt-3 pt-3 border-t border-stone-100 dark:border-stone-800 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-1.5">
                  {sessions.map(s => {
                    const cl = classColor(s.classId);
                    const d = new Date(s.date);
                    const owner = (s.teachers || []).filter(x => x !== t.name).join(", ");
                    return (
                      <div key={s.date+s.classId} className="flex items-center gap-2 px-2.5 py-1.5 rounded-lg bg-stone-50 dark:bg-stone-800/40 border border-stone-100 dark:border-stone-800">
                        <span className="w-1 self-stretch rounded-full" style={{ background: cl.dot }}></span>
                        <div className="flex-1 min-w-0">
                          <div className="text-xs font-semibold text-stone-800 dark:text-stone-100 truncate">{DAY_VN[d.getDay()]} {String(d.getDate()).padStart(2,"0")}/{String(d.getMonth()+1).padStart(2,"0")} · {s.classId}</div>
                          <div className="text-[10px] text-stone-400 dark:text-stone-500 truncate">{s.time}{owner && ` · dự cô ${owner}`}</div>
                        </div>
                        <button onClick={()=>{ if(window.confirm("Bỏ buổi này khỏi lịch dự của " + t.name + "?")) updateFor(t.name, a => a.filter(x => x !== s.date+"|"+s.classId)); }} title="Bỏ" className="text-stone-300 hover:text-rose-500 transition flex-shrink-0"><I.x/></button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {pickerFor && (
        <AuditPicker owner={pickerFor} focusTeacher={null}
          audit={sched[pickerFor.name] || []}
          setAudit={(fn) => updateFor(pickerFor.name, fn)}
          onClose={()=>setPickerFor(null)}/>
      )}
      {slipFor && (
        <SlipModal teacher={slipFor} audit={sched[slipFor.name] || []} onClose={()=>setSlipFor(null)}/>
      )}
    </div>
  );
}

/* ============ APP ============ */
function App() {
  const [tab, setTab] = useState("home");
  const [user, setUser] = useState(loadUser);
  const [dark, setDark] = useState(() => {
    if (typeof window !== "undefined") {
      if (window.__dz_dark !== undefined) return window.__dz_dark;
      try { const v = localStorage.getItem("dz_dark"); if (v !== null) return v === "1"; } catch (e) {}
    }
    return false; // mặc định sáng
  });

  useEffect(() => {
    document.documentElement.classList.toggle("dark", dark);
    window.__dz_dark = dark;
    try { localStorage.setItem("dz_dark", dark ? "1" : "0"); } catch (e) {}
  }, [dark]);

  useEffect(() => {
    try { if (user) localStorage.setItem(USER_KEY, user); else localStorage.removeItem(USER_KEY); } catch (e) {}
  }, [user]);

  if (!user) {
    return <div className="min-h-screen"><LoginScreen onLogin={setUser}/></div>;
  }

  return (
    <div className="flex min-h-screen">
      <Sidebar tab={tab} setTab={setTab} dark={dark} setDark={setDark} user={user} onLogout={()=>setUser("")}/>
      <main className="flex-1 min-w-0">
        {tab === "home" && <HomePage go={setTab} user={user}/>}
        {tab === "classes" && <ClassesPage/>}
        {tab === "teachers" && <TeachersPage user={user}/>}
        {tab === "audit" && <AuditDashboard/>}
        {tab === "sched" && <SchedulerPage/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
